<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Light Bulb Interaction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="startBtn">Start</button>
        <div id="modal"  class="hidden">
            <input type="number" id="bulbCount" maxlength="1" max="4" required
             placeholder="Enter number of bulbs" min="0"><br>
            <!-- <button id="doneBtn">Done</button> -->
            <input type="submit" id="doneBtn">
        </div>
        <div id="bulbContainer"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
